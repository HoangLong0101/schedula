name: CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]
 
env:
  FLUTTER_VERSION: '3.22.3'
 
jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Prepare Firebase config
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_DEV_CONFIG_JSON }}
        run: |
          printf '%s' "$FIREBASE_CONFIG_JSON" > .firebase-config.dev.json
          dart run tool/bootstrap_firebase_config.dart --config-file .firebase-config.dev.json
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos
      - run: flutter test --coverage --dart-define-from-file=.firebase-config.dev.json
      - uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
 
  build_android:
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Prepare Firebase config
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_DEV_CONFIG_JSON }}
        run: |
          printf '%s' "$FIREBASE_CONFIG_JSON" > .firebase-config.dev.json
          dart run tool/bootstrap_firebase_config.dart --config-file .firebase-config.dev.json
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          flutter build apk --flavor dev --dart-define-from-file=.firebase-config.dev.json --debug
 
  build_ios:
    runs-on: macos-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Prepare Firebase config
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_DEV_CONFIG_JSON }}
        run: |
          printf '%s' "$FIREBASE_CONFIG_JSON" > .firebase-config.dev.json
          dart run tool/bootstrap_firebase_config.dart --config-file .firebase-config.dev.json
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          flutter build ios --flavor dev --dart-define-from-file=.firebase-config.dev.json --debug --no-codesign
