name: Deploy Staging
on:
  push:
    branches: [main]
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true
      - name: Prepare Firebase config
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_STAGING_CONFIG_JSON }}
        run: |
          printf '%s' "$FIREBASE_CONFIG_JSON" > .firebase-config.staging.json
          dart run tool/bootstrap_firebase_config.dart --config-file .firebase-config.staging.json
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build release APK (staging)
        run: |
          flutter build apk \
            --flavor staging \
            --dart-define-from-file=.firebase-config.staging.json \
            --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_STAGING_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: build/app/outputs/flutter-apk/app-staging-release.apk
          releaseNotes: 'Build ${{ github.sha }}'
